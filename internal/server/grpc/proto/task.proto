syntax = "proto3";

package swarm.v1;

option go_package = "github.com/swarm-ai/swarm/internal/server/grpc/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common.proto";

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (google.protobuf.Empty);
  rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc RetryTask(RetryTaskRequest) returns (RetryTaskResponse);
  rpc ListTaskDependencies(ListTaskDependenciesRequest) returns (ListTaskDependenciesResponse);
  rpc StreamTaskUpdates(StreamTaskUpdatesRequest) returns (stream TaskUpdate);
  rpc StreamTaskProgress(StreamTaskProgressRequest) returns (stream TaskProgressUpdate);
}

message CreateTaskRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string prompt = 4;
  AgentType agent_type = 5;
  string assigned_agent = 6;
  int32 priority = 7;
  repeated string dependencies = 8;
  map<string, string> input = 9;
  int64 timeout_ms = 10;
  int32 max_retries = 11;
  map<string, string> metadata = 12;
  TaskKind kind = 13;
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  TaskStatus status = 1;
  AgentType agent_type = 2;
  string agent_id = 3;
  int32 page_size = 4;
  string page_token = 5;
  google.protobuf.Timestamp created_after = 6;
  google.protobuf.Timestamp created_before = 7;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message UpdateTaskRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string prompt = 4;
  int32 priority = 5;
  map<string, string> input = 6;
  map<string, string> metadata = 7;
}

message UpdateTaskResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  string id = 1;
}

message ExecuteTaskRequest {
  string task_id = 1;
  string agent_id = 2;
}

message ExecuteTaskResponse {
  TaskResult result = 1;
}

message CancelTaskRequest {
  string id = 1;
}

message CancelTaskResponse {
  Task task = 1;
}

message RetryTaskRequest {
  string id = 1;
}

message RetryTaskResponse {
  Task task = 1;
}

message ListTaskDependenciesRequest {
  string task_id = 1;
}

message ListTaskDependenciesResponse {
  repeated TaskDependency dependencies = 1;
}

message StreamTaskUpdatesRequest {
  string task_id = 1;
}

message TaskUpdate {
  string task_id = 1;
  TaskStatus status = 2;
  google.protobuf.Timestamp timestamp = 3;
  string message = 4;
}

message StreamTaskProgressRequest {
  string task_id = 1;
  int64 interval_ms = 2;
}

message TaskProgressUpdate {
  string task_id = 1;
  double progress = 2;
  google.protobuf.Timestamp timestamp = 3;
  string status_message = 4;
}

message Task {
  string id = 1;
  string name = 2;
  string description = 3;
  string prompt = 4;
  TaskStatus status = 5;
  TaskKind kind = 6;
  int32 priority = 7;
  AgentType agent_type = 8;
  string assigned_agent = 9;
  repeated string dependencies = 10;
  map<string, string> input = 11;
  map<string, string> output = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  google.protobuf.Timestamp started_at = 15;
  google.protobuf.Timestamp completed_at = 16;
  int64 timeout_ms = 17;
  int32 retry_count = 18;
  int32 max_retries = 19;
  double progress = 20;
  TaskResult result = 21;
  string error = 22;
  map<string, string> metadata = 23;
}

message TaskResult {
  string task_id = 1;
  bool success = 2;
  string output = 3;
  repeated Artifact artifacts = 4;
  TaskMetrics metrics = 5;
  google.protobuf.Timestamp completed_at = 6;
}

message TaskMetrics {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
  int64 duration_ms = 3;
  int32 tokens_used = 4;
  int32 tool_calls = 5;
  int32 messages = 6;
  int32 retry_count = 7;
}

message Artifact {
  string id = 1;
  string type = 2;
  string name = 3;
  bytes content = 4;
  map<string, string> metadata = 5;
  google.protobuf.Timestamp created_at = 6;
}

message TaskDependency {
  string task_id = 1;
  string depends_on = 2;
  string status = 3;
}
