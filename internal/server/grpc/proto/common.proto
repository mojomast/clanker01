syntax = "proto3";

package swarm.v1;

option go_package = "github.com/swarm-ai/swarm/internal/server/grpc/proto";

import "google/protobuf/timestamp.proto";

message Empty {}

message Error {
  int32 code = 1;
  string message = 2;
  repeated string details = 3;
}

enum AgentType {
  AGENT_TYPE_UNSPECIFIED = 0;
  AGENT_TYPE_ARCHITECT = 1;
  AGENT_TYPE_CODER = 2;
  AGENT_TYPE_TESTER = 3;
  AGENT_TYPE_REVIEWER = 4;
  AGENT_TYPE_RESEARCHER = 5;
  AGENT_TYPE_COORDINATOR = 6;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_CREATED = 1;
  AGENT_STATUS_READY = 2;
  AGENT_STATUS_RUNNING = 3;
  AGENT_STATUS_PAUSED = 4;
  AGENT_STATUS_ERROR = 5;
  AGENT_STATUS_TERMINATED = 6;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_QUEUED = 2;
  TASK_STATUS_RUNNING = 3;
  TASK_STATUS_BLOCKED = 4;
  TASK_STATUS_COMPLETED = 5;
  TASK_STATUS_FAILED = 6;
  TASK_STATUS_CANCELLED = 7;
}

enum TaskKind {
  TASK_KIND_UNSPECIFIED = 0;
  TASK_KIND_COMPUTE = 1;
  TASK_KIND_IO = 2;
  TASK_KIND_NETWORK = 3;
  TASK_KIND_AGGREGATE = 4;
  TASK_KIND_DECISION = 5;
}

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_LOW = 1;
  PRIORITY_NORMAL = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_CRITICAL = 4;
}
